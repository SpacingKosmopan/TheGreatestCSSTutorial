<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Greatest CSS Tutorial - Grid</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="table_style.css" />
  </head>

  <body>
    <button id="backToTop" class="back-to-top" title="Back">↑</button>

    <div id="learning-box">
      <h1>
        <button onclick="window.location.href = `./inline.html`">
          ◀ prev: inline
        </button>
        display: inline-block;
      </h1>
      <div id="info-box">
        <p>
          Element in text (like one word). Takes as much space as its contents.
        </p>
        <p>Usage: links(a), styling(b), icons(i), images(img)</p>
        <p>
          You can't set its height or width. It ignores top and bottom margins
        </p>
      </div>
    </div>
    <script>
      const backToTopBtn = document.getElementById("backToTop");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.add("show");
        } else {
          backToTopBtn.classList.remove("show");
        }
      });

      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>
  </body>
</html>
