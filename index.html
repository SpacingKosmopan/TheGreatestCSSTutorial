<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Greatest CSS Tutorial</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <button onclick="window.location.href = `./flex.html`">
        display: flex</button
      ><button onclick="window.location.href = `./grid.html`">
        display: grid</button
      ><button onclick="window.location.href = `./block.html`">
        display: block</button
      ><button onclick="window.location.href = `./inline.html`">
        display: inline</button
      ><button onclick="window.location.href = `./inline-block.html`">
        display: inline-block
      </button>
      <hr />
      <button onclick="window.location.href = `./svg.html`">SVG</button
      ><button onclick="window.location.href = `./css_shapes.html`">
        CSS shapes</button
      ><button onclick="window.location.href = `./canvas.html`">Canvas</button>
    </main>
    <script>
      const backToTopBtn = document.getElementById("backToTop");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.add("show");
        } else {
          backToTopBtn.classList.remove("show");
        }
      });

      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>
  </body>
</html>
