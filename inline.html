<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Greatest CSS Tutorial - Grid</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="table_style.css" />
  </head>

  <body>
    <button id="backToTop" class="back-to-top" title="Back">↑</button>

    <div id="learning-box">
      <h1>
        <button onclick="window.location.href = `./block.html`">
          ◀ prev: block
        </button>
        display: inline;<button
          onclick="window.location.href = `./inline-block.html`"
        >
          ▶ next: inline-block
        </button>
      </h1>
      <div id="info-box">
        <p>Element in text</p>
        <p>Usage: buttons, tiles</p>
        <p>You can set its height, width and top and bottom margins</p>
      </div>
    </div>
    <script>
      const backToTopBtn = document.getElementById("backToTop");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.add("show");
        } else {
          backToTopBtn.classList.remove("show");
        }
      });

      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>
  </body>
</html>
